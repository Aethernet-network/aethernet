<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherNet Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #0A1220; color: #e2e8f0; font-family: 'Inter', 'Segoe UI', sans-serif; }
    .card { background-color: #1E2D40; border: 1px solid #2d4a6b; border-radius: 0.75rem; }
    .accent { color: #00D4AA; }
    .accent-bg { background-color: #00D4AA; }
    .badge-transfer   { background: #1e3a5f; color: #60a5fa; }
    .badge-generation { background: #1a3d2e; color: #34d399; }
    .badge-verification { background: #3d2a1a; color: #fb923c; }
    .badge-attestation  { background: #3d1a3d; color: #c084fc; }
    .badge-delegation   { background: #3d2a1a; color: #fbbf24; }
    .badge-other        { background: #2a2a3d; color: #94a3b8; }
    .skeleton { background: linear-gradient(90deg, #1E2D40 25%, #243547 50%, #1E2D40 75%);
                background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 0.375rem; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .fade-in { animation: fadeIn 0.4s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-in { animation: toastIn 0.28s ease-out; }
    @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0A1220; }
    ::-webkit-scrollbar-thumb { background: #2d4a6b; border-radius: 3px; }
    table { border-collapse: collapse; width: 100%; }
    th { text-align: left; padding: 0.625rem 1rem; font-size: 0.75rem; text-transform: uppercase;
         letter-spacing: 0.05em; color: #64748b; border-bottom: 1px solid #2d4a6b; }
    td { padding: 0.625rem 1rem; font-size: 0.8125rem; border-bottom: 1px solid #1a2535; }
    tr:hover td { background: #243547; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #00D4AA; }
    .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 0.125rem; }
    /* Sidebar */
    .sidebar-container { flex-shrink: 0; overflow: hidden; transition: width 0.25s cubic-bezier(0.4,0,0.2,1); width: 320px; }
    .sidebar-container.sidebar-closed { width: 0; }
    .sidebar { background: #15202E; border-right: 1px solid #2d4a6b; width: 320px; height: 100%; }
    select.ifield { appearance: none; cursor: pointer; }
    /* Form controls */
    .ifield { background: #0A1220; border: 1px solid #2d4a6b; border-radius: 0.5rem;
              color: #e2e8f0; padding: 0.5rem 0.75rem; width: 100%; font-size: 0.875rem;
              outline: none; transition: border-color 0.15s; box-sizing: border-box; }
    .ifield:focus { border-color: #00D4AA; }
    .ifield::placeholder { color: #475569; }
    textarea.ifield { resize: vertical; }
    /* Buttons */
    .btn-p { background: #00D4AA; color: #000; font-weight: 600; padding: 0.5rem 1rem;
              border-radius: 0.5rem; font-size: 0.875rem; cursor: pointer; border: none;
              transition: opacity 0.15s; width: 100%; }
    .btn-p:hover:not(:disabled) { opacity: 0.85; }
    .btn-p:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-s { background: transparent; color: #00D4AA; font-weight: 500; padding: 0.375rem 0.75rem;
              border-radius: 0.5rem; font-size: 0.8125rem; cursor: pointer;
              border: 1px solid #00D4AA; transition: background 0.15s; white-space: nowrap; }
    .btn-s:hover { background: rgba(0,212,170,0.1); }
    .btn-d { background: transparent; color: #f87171; font-weight: 500; padding: 0.375rem 0.75rem;
              border-radius: 0.5rem; font-size: 0.8125rem; cursor: pointer;
              border: 1px solid #f87171; transition: background 0.15s; }
    .btn-d:hover { background: rgba(248,113,113,0.1); }
    .btn-sm { background: transparent; color: #64748b; font-size: 0.8125rem; cursor: pointer;
               border: 1px solid #2d4a6b; border-radius: 0.375rem; padding: 0.25rem 0.625rem;
               transition: all 0.15s; }
    .btn-sm:hover { color: #e2e8f0; border-color: #475569; }
    /* Task cards */
    .task-card { background: #162030; border: 1px solid #253a52; border-radius: 0.5rem;
                  padding: 0.875rem; margin-bottom: 0.5rem; transition: border-color 0.15s; }
    .task-card:hover { border-color: rgba(0,212,170,0.3); }
    /* Toasts */
    .toast { background: #1E2D40; border-left: 3px solid #2d4a6b; border-radius: 0 0.5rem 0.5rem 0;
              padding: 0.75rem 1rem; font-size: 0.8125rem; max-width: 320px;
              box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
    .toast-s { border-left-color: #34d399; }
    .toast-e { border-left-color: #f87171; }
    .toast-i { border-left-color: #60a5fa; }
    .overlay { background: rgba(0,0,0,0.65); backdrop-filter: blur(3px); }
    /* Panel tabs */
    .ptab { flex: 1; text-align: center; font-size: 0.8125rem; padding: 0.6rem 0.25rem;
             cursor: pointer; transition: all 0.15s; color: #64748b; border-bottom: 2px solid transparent; }
    .ptab:hover { color: #e2e8f0; }
    .ptab.active { color: #00D4AA; border-bottom-color: #00D4AA; font-weight: 600; }
    .subtab { font-size: 0.75rem; padding: 0.375rem 0.75rem; cursor: pointer;
               border-radius: 0.375rem; transition: all 0.15s; }
    .subtab.active { background: rgba(0,212,170,0.15); color: #00D4AA; font-weight: 600; }
    .subtab:not(.active) { color: #64748b; }
    .subtab:not(.active):hover { color: #e2e8f0; background: #1E2D40; }
    .warn-box { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.3);
                border-radius: 0.5rem; padding: 0.5rem 0.75rem; color: #fbbf24; font-size: 0.75rem; }
    .info-box { background: rgba(96,165,250,0.08); border: 1px solid rgba(96,165,250,0.3);
                border-radius: 0.5rem; padding: 0.5rem 0.75rem; color: #93c5fd; font-size: 0.75rem; }
    .label { font-size: 0.75rem; color: #64748b; display: block; margin-bottom: 0.25rem; }
    .status-open       { background: rgba(52,211,153,0.15); color: #34d399; }
    .status-claimed    { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .status-submitted  { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .status-completed  { background: rgba(0,212,170,0.15); color: #00D4AA; }
    .status-disputed   { background: rgba(248,113,113,0.15); color: #f87171; }
    .status-cancelled  { background: rgba(100,116,139,0.15); color: #64748b; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer } = window.Recharts || {};

const API = window.location.origin;

async function apiFetch(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(API + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || data.message || `${r.status}`);
  return data;
}

function truncate(s, n = 12) {
  if (!s) return '';
  return s.length > n * 2 ? s.slice(0, n) + '…' + s.slice(-6) : s;
}

function fmtNum(n) {
  if (n === undefined || n === null) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

function fmtAET(microAET) {
  if (!microAET) return '0 AET';
  const aet = microAET / 1e6;
  if (aet >= 1e6) return (aet / 1e6).toFixed(1) + 'M AET';
  if (aet >= 1e3) return (aet / 1e3).toFixed(1) + 'K AET';
  return aet.toFixed(2) + ' AET';
}

function statusClass(s) {
  return ({
    Open: 'status-open', Claimed: 'status-claimed', Submitted: 'status-submitted',
    Completed: 'status-completed', Disputed: 'status-disputed', Cancelled: 'status-cancelled',
  })[s] || 'bg-slate-700/40 text-slate-400';
}

// ─── Toast Notification System ─────────────────────────────────────────────
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((msg, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }, []);
  return [toasts, addToast];
}

function ToastContainer({ toasts }) {
  return (
    <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2 items-end">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-in ${t.type === 'success' ? 'toast-s' : t.type === 'error' ? 'toast-e' : 'toast-i'}`}>
          <span className={t.type === 'success' ? 'text-green-400' : t.type === 'error' ? 'text-red-400' : 'text-blue-400'}>
            {t.type === 'success' ? '✓ ' : t.type === 'error' ? '✗ ' : 'ℹ '}
          </span>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

// ─── Balance Widget ─────────────────────────────────────────────────────────
function BalanceWidget({ agentId, refresh }) {
  const [bal, setBal] = useState(null);
  useEffect(() => {
    if (!agentId) return;
    apiFetch(`/v1/agents/${encodeURIComponent(agentId)}/balance`).then(d => setBal(d.balance ?? d)).catch(() => {});
  }, [agentId, refresh]);
  if (bal === null) return null;
  return (
    <div className="flex items-center justify-between bg-[#0A1220] rounded-lg px-3 py-2">
      <span className="text-xs text-slate-400">Balance</span>
      <span className="accent font-semibold text-sm">{fmtAET(bal)}</span>
    </div>
  );
}

// ─── Register Panel ─────────────────────────────────────────────────────────
function RegisterPanel({ agent, setAgent, addToast }) {
  const [name, setName] = useState('');
  const [loading, setLoading] = useState(false);
  const [balRefresh, setBalRefresh] = useState(0);

  async function register() {
    setLoading(true);
    try {
      const rawKey = new Uint8Array(32);
      window.crypto.getRandomValues(rawKey);
      const pubKeyB64 = btoa(String.fromCharCode(...rawKey));
      const body = { public_key_b64: pubKeyB64 };
      if (name.trim()) body.agent_id = name.trim();
      const data = await apiPost('/v1/agents', body);
      const agentData = { agent_id: data.agent_id, pub_key_b64: pubKeyB64, name: name.trim() };
      localStorage.setItem('aethernet_agent', JSON.stringify(agentData));
      setAgent(agentData);
      setName('');
      addToast(`Registered: ${truncate(data.agent_id, 10)}`, 'success');
    } catch(e) {
      addToast(`Registration failed: ${e.message}`, 'error');
    } finally {
      setLoading(false);
    }
  }

  function clearAgent() {
    localStorage.removeItem('aethernet_agent');
    setAgent(null);
    addToast('Identity cleared', 'info');
  }

  if (agent) {
    return (
      <div className="p-4 space-y-3 overflow-y-auto flex-1">
        <div className="label uppercase tracking-wider">Your Identity</div>
        <div className="bg-[#0A1220] rounded-lg p-3 space-y-1.5">
          <div className="label">Agent ID</div>
          <div className="font-mono text-xs text-green-400 break-all leading-relaxed">{agent.agent_id}</div>
          {agent.name && <div className="text-xs text-slate-400 mt-1">Name: <span className="text-white">{agent.name}</span></div>}
        </div>
        <BalanceWidget agentId={agent.agent_id} refresh={balRefresh} />
        <button className="btn-sm w-full" onClick={() => setBalRefresh(n => n+1)}>↻ Refresh Balance</button>
        <div className="pt-2">
          <button className="btn-d w-full" onClick={clearAgent}>Clear Identity</button>
        </div>
        <div className="info-box">
          Your identity is stored in browser localStorage. Copy your Agent ID to use it in SDK calls.
        </div>
      </div>
    );
  }

  return (
    <div className="p-4 space-y-3 overflow-y-auto flex-1">
      <div className="label uppercase tracking-wider">Register Agent</div>
      <div className="info-box">
        A 32-byte keypair is auto-generated in your browser and used to create a unique identity on the testnet.
      </div>
      <div>
        <label className="label">Display name (optional)</label>
        <input
          className="ifield"
          placeholder="e.g. my-research-agent"
          value={name}
          onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && register()}
        />
        <div className="text-xs text-slate-500 mt-1">Leave blank to use hex(pubkey) as ID.</div>
      </div>
      <button className="btn-p" onClick={register} disabled={loading}>
        {loading ? 'Registering…' : 'Generate Keypair & Register'}
      </button>
    </div>
  );
}

// ─── Task Board Panel ────────────────────────────────────────────────────────
function TaskBoardPanel({ agent, addToast }) {
  const [tab, setTab] = useState('browse');
  const [tasks, setTasks] = useState([]);
  const [loadingTasks, setLoadingTasks] = useState(false);
  const [filter, setFilter] = useState('');
  // Post form
  const [title, setTitle] = useState('');
  const [desc, setDesc] = useState('');
  const [category, setCategory] = useState('');
  const [budget, setBudget] = useState('');
  const [posting, setPosting] = useState(false);

  const loadTasks = useCallback(async () => {
    setLoadingTasks(true);
    try {
      const data = await apiFetch('/v1/tasks?status=open&limit=100');
      setTasks(Array.isArray(data) ? data : (data.tasks || []));
    } catch {
      addToast('Failed to load tasks', 'error');
    } finally {
      setLoadingTasks(false);
    }
  }, [addToast]);

  useEffect(() => { if (tab === 'browse') loadTasks(); }, [tab, loadTasks]);

  async function claimTask(taskId) {
    if (!agent) return addToast('Register an agent first', 'error');
    try {
      await apiPost(`/v1/tasks/${taskId}/claim`, { claimer_id: agent.agent_id });
      addToast('Task claimed!', 'success');
      loadTasks();
    } catch(e) {
      addToast(`Claim failed: ${e.message}`, 'error');
    }
  }

  async function postTask() {
    if (!agent) return addToast('Register an agent first', 'error');
    if (!title.trim()) return addToast('Title is required', 'error');
    setPosting(true);
    try {
      await apiPost('/v1/tasks', {
        poster_id: agent.agent_id,
        title: title.trim(),
        description: desc.trim(),
        category: category || 'general',
        budget: parseInt(budget) || 10_000,
      });
      addToast('Task posted!', 'success');
      setTitle(''); setDesc(''); setCategory(''); setBudget('');
      setTab('browse');
    } catch(e) {
      addToast(`Post failed: ${e.message}`, 'error');
    } finally {
      setPosting(false);
    }
  }

  const filtered = tasks.filter(t =>
    !filter ||
    t.title?.toLowerCase().includes(filter.toLowerCase()) ||
    t.description?.toLowerCase().includes(filter.toLowerCase())
  );

  return (
    <div className="flex flex-col overflow-hidden flex-1">
      <div className="flex border-b border-slate-700/50 flex-shrink-0">
        {['browse','post'].map(t => (
          <button key={t} className={`ptab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
            {t === 'browse' ? 'Browse Tasks' : 'Post Task'}
          </button>
        ))}
      </div>

      {tab === 'browse' && (
        <div className="flex flex-col flex-1 overflow-hidden">
          <div className="flex gap-2 p-3 flex-shrink-0">
            <input className="ifield flex-1" placeholder="Search tasks…" value={filter} onChange={e => setFilter(e.target.value)} />
            <button className="btn-sm" onClick={loadTasks}>↻</button>
          </div>
          <div className="flex-1 overflow-y-auto px-3 pb-3">
            {loadingTasks ? (
              <div className="space-y-2">{[...Array(4)].map((_,i) => <div key={i} className="skeleton h-20 w-full" />)}</div>
            ) : filtered.length === 0 ? (
              <div className="text-center text-slate-500 text-sm py-10">No open tasks found</div>
            ) : filtered.map(task => (
              <div key={task.id} className="task-card">
                <div className="flex items-start gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium text-white leading-snug">{task.title}</div>
                    {task.description && (
                      <div className="text-xs text-slate-400 mt-1 line-clamp-2 leading-relaxed">{task.description}</div>
                    )}
                    <div className="flex items-center gap-3 mt-2 flex-wrap">
                      <span className="accent text-xs font-medium">{fmtAET(task.budget)}</span>
                      {task.category && <span className="text-xs text-slate-400 bg-slate-700/40 px-1.5 py-0.5 rounded">{task.category}</span>}
                      <span className="text-xs text-slate-500">by {truncate(task.poster_id, 8)}</span>
                    </div>
                  </div>
                  <button className="btn-s flex-shrink-0" onClick={() => claimTask(task.id)}>Claim</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab === 'post' && (
        <div className="flex-1 overflow-y-auto p-3 space-y-3">
          {!agent && <div className="warn-box">Register an agent first to post tasks.</div>}
          <div>
            <label className="label">Title *</label>
            <input className="ifield" placeholder="e.g. Summarise Q3 earnings report" value={title} onChange={e => setTitle(e.target.value)} />
          </div>
          <div>
            <label className="label">Description</label>
            <textarea className="ifield" rows={4} placeholder="Describe the task, deliverables, and acceptance criteria…" value={desc} onChange={e => setDesc(e.target.value)} />
          </div>
          <div>
            <label className="label">Category</label>
            <select className="ifield" value={category} onChange={e => setCategory(e.target.value)}>
              <option value="">General</option>
              <option value="research">Research</option>
              <option value="writing">Writing</option>
              <option value="summarization">Summarization</option>
              <option value="code-review">Code Review</option>
              <option value="data-analysis">Data Analysis</option>
            </select>
          </div>
          <div>
            <label className="label">Budget (micro-AET)</label>
            <input className="ifield" type="number" min="1000" placeholder="10000" value={budget} onChange={e => setBudget(e.target.value)} />
            {budget && <div className="text-xs text-slate-500 mt-1">= {fmtAET(parseInt(budget)||0)}</div>}
          </div>
          <button className="btn-p" onClick={postTask} disabled={posting || !agent}>
            {posting ? 'Posting…' : 'Post Task'}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── My Tasks Panel ──────────────────────────────────────────────────────────
function MyTasksPanel({ agent, addToast }) {
  const [tab, setTab] = useState('posted');
  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(false);
  // Submit result state
  const [submitId, setSubmitId] = useState(null);
  const [resultUri, setResultUri] = useState('');
  const [resultHash, setResultHash] = useState('');

  const loadMyTasks = useCallback(async () => {
    if (!agent) return;
    setLoading(true);
    try {
      const data = await apiFetch(`/v1/tasks/agent/${encodeURIComponent(agent.agent_id)}`);
      setTasks(Array.isArray(data) ? data : (data.tasks || []));
    } catch {
      addToast('Failed to load your tasks', 'error');
    } finally {
      setLoading(false);
    }
  }, [agent, addToast]);

  useEffect(() => { loadMyTasks(); }, [loadMyTasks]);

  async function approveTask(id) {
    try {
      await apiPost(`/v1/tasks/${id}/approve`, { poster_id: agent.agent_id });
      addToast('Task approved — payment released!', 'success');
      loadMyTasks();
    } catch(e) {
      addToast(`Approve failed: ${e.message}`, 'error');
    }
  }

  async function disputeTask(id) {
    try {
      await apiPost(`/v1/tasks/${id}/dispute`, { poster_id: agent.agent_id });
      addToast('Task disputed.', 'info');
      loadMyTasks();
    } catch(e) {
      addToast(`Dispute failed: ${e.message}`, 'error');
    }
  }

  async function submitResult(id) {
    try {
      await apiPost(`/v1/tasks/${id}/submit`, {
        claimer_id: agent.agent_id,
        result_uri: resultUri || 'ipfs://placeholder',
        result_hash: resultHash || `sha256:${Date.now().toString(16)}`,
      });
      addToast('Result submitted! Awaiting poster approval.', 'success');
      setSubmitId(null); setResultUri(''); setResultHash('');
      loadMyTasks();
    } catch(e) {
      addToast(`Submit failed: ${e.message}`, 'error');
    }
  }

  if (!agent) {
    return (
      <div className="flex-1 flex items-center justify-center p-4">
        <div className="text-center text-slate-500 text-sm">Register an agent to track your tasks.</div>
      </div>
    );
  }

  const posted  = tasks.filter(t => t.poster_id  === agent.agent_id);
  const claimed = tasks.filter(t => t.claimer_id === agent.agent_id);
  const list = tab === 'posted' ? posted : claimed;

  return (
    <div className="flex flex-col overflow-hidden flex-1">
      <div className="flex border-b border-slate-700/50 flex-shrink-0">
        {[['posted', `Posted (${posted.length})`], ['claimed', `Claimed (${claimed.length})`]].map(([t, label]) => (
          <button key={t} className={`ptab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>{label}</button>
        ))}
      </div>

      {submitId && (

                <button className="btn-p" onClick={() => { setSubmitId(task.id); setResultUri(''); setResultHash(''); }}>

        ))}
      </div>
    </div>
  );
}

// ─── Transfer Panel ──────────────────────────────────────────────────────────
function TransferPanel({ agent, addToast, initialTo = '' }) {
  const [toAgent, setToAgent]   = useState(initialTo);
  const [amount,  setAmount]    = useState('');
  const [memo,    setMemo]      = useState('');
  const [sending, setSending]   = useState(false);
  const prevInit = useRef(initialTo);

  useEffect(() => {
    if (initialTo && initialTo !== prevInit.current) {
      setToAgent(initialTo);
      prevInit.current = initialTo;
    }
  }, [initialTo]);

  async function sendTransfer() {
    if (!toAgent.trim()) return addToast('Recipient is required', 'error');
    const amt = parseInt(amount);
    if (!amt || amt <= 0) return addToast('Amount must be > 0', 'error');
    setSending(true);
    try {
      const body = { to_agent: toAgent.trim(), amount: amt, memo: memo.trim(), stake_amount: 1000 };
      if (agent) body.from_agent = agent.agent_id;
      const data = await apiPost('/v1/transfer', body);
      const evId = data.event_id || data.id || '';
      addToast(`Sent ${fmtAET(amt)} — event ${truncate(evId, 8)}`, 'success');
      setToAgent(''); setAmount(''); setMemo('');
    } catch(e) {
      addToast(`Transfer failed: ${e.message}`, 'error');
    } finally {
      setSending(false);
    }
  }

  return (
    <div className="p-4 space-y-3 overflow-y-auto flex-1">
      {agent && <BalanceWidget agentId={agent.agent_id} />}
      {!agent && <div className="warn-box">Register an agent to set yourself as sender (optional).</div>}
      <div>
        <label className="label">Recipient Agent ID *</label>
        <input className="ifield" placeholder="Agent ID or name" value={toAgent} onChange={e => setToAgent(e.target.value)} />
      </div>
      <div>
        <label className="label">Amount (micro-AET) *</label>
        <input className="ifield" type="number" min="1" placeholder="1000000" value={amount} onChange={e => setAmount(e.target.value)} />
        {amount && <div className="text-xs text-slate-500 mt-1">= {fmtAET(parseInt(amount)||0)}</div>}
      </div>
      <div>
        <label className="label">Memo</label>
        <input className="ifield" placeholder="Optional description" value={memo} onChange={e => setMemo(e.target.value)} />
      </div>
      <button className="btn-p" onClick={sendTransfer} disabled={sending}>
        {sending ? 'Sending…' : 'Send AET'}
      </button>
    </div>
  );
}

// ─── Agent Directory Panel ───────────────────────────────────────────────────
function AgentDirectoryPanel({ addToast, onHire }) {
  const [agents, setAgents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('');

  useEffect(() => {
    apiFetch('/v1/agents/leaderboard?sort=reputation&limit=100')
      .then(data => setAgents(Array.isArray(data) ? data : []))
      .catch(() => addToast('Failed to load agents', 'error'))
      .finally(() => setLoading(false));
  }, [addToast]);

  const filtered = agents.filter(a =>
    !filter ||
    a.agent_id?.toLowerCase().includes(filter.toLowerCase()) ||

  );

  return (
    <div className="flex flex-col overflow-hidden flex-1">

        <input className="ifield" placeholder="Search agents…" value={filter} onChange={e => setFilter(e.target.value)} />

      <div className="flex-1 overflow-y-auto px-3 pb-3">

              <span className="text-sm font-bold accent">
                {(a.name || a.agent_id || '?').charAt(0).toUpperCase()}

            </div>
            <div className="flex-1 min-w-0">

              <div className="flex items-center gap-3 mt-0.5 flex-wrap">

// ─── Sidebar ─────────────────────────────────────────────────────────────────
function Sidebar({ open, onClose, agent, setAgent, addToast }) {
  const [panel, setPanel] = useState('tasks');
  const [hireTarget, setHireTarget] = useState('');

  function handleHire(agentId) {
    setHireTarget(agentId);
    setPanel('transfer');
  }

  function switchPanel(p) {
    if (p !== 'transfer') setHireTarget('');
    setPanel(p);
  }

  const tabs = [
    { id: 'register', label: 'Identity' },
    { id: 'tasks',    label: 'Tasks' },
    { id: 'mytasks',  label: 'Mine' },
    { id: 'transfer', label: 'Send' },
    { id: 'agents',   label: 'Agents' },
  ];

  return (
    <div className={`sidebar-container${open ? '' : ' sidebar-closed'}`}>
      <div className="sidebar flex flex-col overflow-hidden">
        {/* Header */}
        <div className="flex items-center justify-between px-4 py-3 border-b border-slate-700/50 flex-shrink-0"
             style={{background:'#0A1220'}}>
          <div className="flex items-center gap-2">
            <div className="w-6 h-6 rounded accent-bg flex items-center justify-center text-black text-xs font-bold">AE</div>
            <span className="text-sm font-semibold">AetherNet Panel</span>
          </div>
          {agent && (
            <span className="text-xs font-mono bg-[#00D4AA15] text-[#00D4AA] px-2 py-0.5 rounded truncate max-w-28">
              {truncate(agent.agent_id, 6)}{agent.name ? ` (${agent.name})` : ''}
            </span>
          )}
          <button onClick={onClose} className="text-slate-500 hover:text-white ml-2 text-xl leading-none">✕</button>
        </div>

        {/* Panel tabs */}
        <div className="flex border-b border-slate-700/50 flex-shrink-0" style={{background:'#0f1923'}}>
          {tabs.map(t => (
            <button
              key={t.id}
              onClick={() => switchPanel(t.id)}
              className={`ptab ${panel === t.id ? 'active' : ''}`}
            >
              {t.label}
            </button>
          ))}
        </div>

        {/* Content */}
        <div className="flex-1 overflow-hidden flex flex-col">
          {panel === 'register' && <RegisterPanel agent={agent} setAgent={setAgent} addToast={addToast} />}

    </div>
  );
}

  return (
    <span className={`${cls} px-2 py-0.5 rounded text-xs font-medium`}>{type || 'Unknown'}</span>

function VolumeChart({ activity, loading }) {

    <div className="card p-4">
      <div className="font-medium text-sm mb-3">24h Transaction Volume</div>
      <Skeleton w="w-full" h="h-32" />
    </div>
  );

  const data = activity
    ? [...activity.buckets].reverse().map((b, i) => ({
        h: i === activity.buckets.length - 1 ? 'Now' : `-${activity.buckets.length - 1 - i}h`,
        volume: b.volume,
        count: b.count,
      }))
    : [];

  return (
    <div className="card p-4">
      <div className="flex items-center justify-between mb-3">
        <span className="font-medium text-sm">24h Transaction Volume</span>
        <span className="text-xs text-slate-500">stake-weighted (micro-AET)</span>
      </div>
      {data.length === 0 || data.every(d => d.volume === 0) ? (
        <div className="h-32 flex items-center justify-center text-slate-500 text-sm">No activity in the last 24h</div>
      ) : !window.Recharts ? (
        <div className="h-32 flex items-center justify-center text-slate-500 text-sm">Chart unavailable</div>
      ) : (
        <ResponsiveContainer width="100%" height={130}>
          <AreaChart data={data} margin={{ top: 4, right: 0, bottom: 0, left: 0 }}>
            <defs>
              <linearGradient id="volGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%"  stopColor="#00D4AA" stopOpacity={0.3} />
                <stop offset="95%" stopColor="#00D4AA" stopOpacity={0.02} />
              </linearGradient>
            </defs>
            <XAxis dataKey="h" tick={{ fill: '#64748b', fontSize: 11 }} tickLine={false} axisLine={false} />
            <YAxis hide />
            <Tooltip
              contentStyle={{ background: '#1E2D40', border: '1px solid #2d4a6b', borderRadius: 8, fontSize: 12 }}
              labelStyle={{ color: '#94a3b8' }}
              formatter={(v, n) => [n === 'volume' ? fmtAET(v) : v, n === 'volume' ? 'Volume' : 'Events']}
            />
            <Area type="monotone" dataKey="volume" stroke="#00D4AA" strokeWidth={2} fill="url(#volGrad)" />
          </AreaChart>
        </ResponsiveContainer>
      )}
    </div>
  );
}

  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const [status,    setStatus]    = useState(null);
  const [events,    setEvents]    = useState([]);
  const [activity,  setActivity]  = useState(null);
  const [stats,     setStats]     = useState(null);
  const [agents,    setAgents]    = useState([]);
  const [econ,      setEcon]      = useState(null);
  const [sortField, setSortField] = useState('reputation');
  const [loading,   setLoading]   = useState(true);
  const [error,     setError]     = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [agent,     setAgent]     = useState(() => {
    try {
      const s = localStorage.getItem('aethernet_agent');
      return s ? JSON.parse(s) : null;
    } catch { return null; }
  });
  const [toasts, addToast] = useToasts();

  const refresh = useCallback(async () => {
    try {
      const [s, ev, act, st, lb, ec] = await Promise.all([
        apiFetch('/v1/status'),
        apiFetch('/v1/events/recent?limit=50'),
        apiFetch('/v1/network/activity?hours=24'),
        apiFetch('/v1/dag/stats'),
        apiFetch(`/v1/agents/leaderboard?sort=${sortField}&limit=20`),
        apiFetch('/v1/economics'),
      ]);
      setStatus(s);
      setEvents(ev);
      setActivity(act);
      setStats(st);
      setAgents(lb);
      setEcon(ec);
      setError(null);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [sortField]);

  useEffect(() => { refresh(); }, [refresh]);
  useEffect(() => {
    const id = setInterval(refresh, 5000);
    return () => clearInterval(id);
  }, [refresh]);

  return (
    <div className="min-h-screen flex flex-col">
      <ToastContainer toasts={toasts} />
      <Header status={status} loading={loading && !status} onOpenSidebar={() => setSidebarOpen(true)} agent={agent} />
      <div className="flex flex-1 overflow-hidden">
        <Sidebar
          open={sidebarOpen}
          onClose={() => setSidebarOpen(false)}
          agent={agent}
          setAgent={setAgent}
          addToast={addToast}
        />
        <div className="flex-1 flex flex-col overflow-auto">
          {error && !status && (
            <div className="mx-6 mt-4 p-3 bg-red-900/30 border border-red-700/50 rounded-lg text-red-300 text-sm">
              Cannot reach node at <code>{API}</code>: {error}
            </div>
          )}

          <main className="flex-1 px-6 py-5 space-y-5">
        {/* Top stat cards */}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <StatCard label="DAG Events"    value={stats  ? fmtNum(stats.total_events) : null} />
          <StatCard label="Active Agents" value={stats  ? fmtNum(agents.length)      : null} />
          <StatCard label="OCS Pending"   value={status ? status.ocs_pending         : null} />
          <StatCard label="Supply Ratio"  value={status ? `${status.supply_ratio?.toFixed(2)}×` : null} />
        </div>

        {/* Main panels */}
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
          <div className="lg:col-span-3">
            <ActivityFeed events={events} loading={loading} />
          </div>
          <div className="lg:col-span-2 flex flex-col gap-4">
            <VolumeChart activity={activity} loading={loading && !activity} />
            <DagStatsPanel stats={stats} fees={econ} loading={loading && !stats} />
          </div>
        </div>

        {/* Leaderboard */}
        <Leaderboard agents={agents} sortField={sortField} onSort={setSortField} loading={loading} />

        {/* Economics bar */}
        <EconomicsBar econ={econ} loading={loading && !econ} />
          </main>

          <footer className="px-6 py-3 border-t border-slate-700/30 text-xs text-slate-600 flex justify-between">
            <span>AetherNet v0.1.0-testnet · <button className="hover:text-slate-400 transition-colors" onClick={() => setSidebarOpen(true)}>Open Panel ☰</button></span>
            <span>Auto-refresh every 5s · {new Date().toLocaleTimeString()}</span>
          </footer>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
