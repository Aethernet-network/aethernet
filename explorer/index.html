<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherNet Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #0A1220; color: #e2e8f0; font-family: 'Inter', 'Segoe UI', sans-serif; }
    .card { background-color: #1E2D40; border: 1px solid #2d4a6b; border-radius: 0.75rem; }
    .accent { color: #00D4AA; }
    .accent-bg { background-color: #00D4AA; }
    .badge-transfer   { background: #1e3a5f; color: #60a5fa; }
    .badge-generation { background: #1a3d2e; color: #34d399; }
    .badge-verification { background: #3d2a1a; color: #fb923c; }
    .badge-attestation  { background: #3d1a3d; color: #c084fc; }
    .badge-delegation   { background: #3d2a1a; color: #fbbf24; }
    .badge-other        { background: #2a2a3d; color: #94a3b8; }
    .skeleton { background: linear-gradient(90deg, #1E2D40 25%, #243547 50%, #1E2D40 75%);
                background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 0.375rem; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .fade-in { animation: fadeIn 0.4s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0A1220; }
    ::-webkit-scrollbar-thumb { background: #2d4a6b; border-radius: 3px; }
    table { border-collapse: collapse; width: 100%; }
    th { text-align: left; padding: 0.625rem 1rem; font-size: 0.75rem; text-transform: uppercase;
         letter-spacing: 0.05em; color: #64748b; border-bottom: 1px solid #2d4a6b; }
    td { padding: 0.625rem 1rem; font-size: 0.8125rem; border-bottom: 1px solid #1a2535; }
    tr:hover td { background: #243547; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #00D4AA; }
    .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 0.125rem; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer } = window.Recharts || {};

const API = window.location.origin;

async function apiFetch(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

function truncate(s, n = 12) {
  if (!s) return '';
  return s.length > n * 2 ? s.slice(0, n) + '…' + s.slice(-6) : s;
}

function fmtNum(n) {
  if (n === undefined || n === null) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

function fmtAET(microAET) {
  if (!microAET) return '0 AET';
  const aet = microAET / 1e6;
  if (aet >= 1e6) return (aet / 1e6).toFixed(1) + 'M AET';
  if (aet >= 1e3) return (aet / 1e3).toFixed(1) + 'K AET';
  return aet.toFixed(2) + ' AET';
}

function EventBadge({ type }) {
  const cls = {
    Transfer:     'badge-transfer',
    Generation:   'badge-generation',
    Verification: 'badge-verification',
    Attestation:  'badge-attestation',
    Delegation:   'badge-delegation',
  }[type] || 'badge-other';
  return (
    <span className={`${cls} px-2 py-0.5 rounded text-xs font-medium`}>{type || 'Unknown'}</span>
  );
}

function Skeleton({ w = 'w-full', h = 'h-4' }) {
  return <div className={`skeleton ${w} ${h}`} />;
}

function StatCard({ label, value, sub }) {
  return (
    <div className="card p-4">
      <div className="stat-value">{value ?? <Skeleton w="w-24" h="h-7" />}</div>
      <div className="stat-label">{label}</div>
      {sub && <div className="text-xs text-slate-500 mt-1">{sub}</div>}
    </div>
  );
}

// ─── Header ────────────────────────────────────────────────────────────────
function Header({ status, loading }) {
  return (
    <header className="border-b border-slate-700/50 px-6 py-4 flex items-center justify-between">
      <div className="flex items-center gap-3">
        <div className="w-8 h-8 rounded-lg accent-bg flex items-center justify-center font-bold text-black text-sm">AE</div>
        <span className="font-semibold text-lg tracking-tight">AetherNet Explorer</span>
        <span className="text-xs text-slate-500 hidden sm:inline">Decentralised AI Economy</span>
      </div>
      <div className="flex items-center gap-6 text-sm">
        {loading ? (
          <Skeleton w="w-48" h="h-4" />
        ) : status ? (
          <>
            <span className="text-slate-400">Peers <span className="text-white font-medium">{status.peers}</span></span>
            <span className="text-slate-400">DAG <span className="text-white font-medium">{fmtNum(status.dag_size)}</span></span>
            <span className="text-slate-400">Pending <span className="accent font-medium">{status.ocs_pending}</span></span>
            <span className="text-slate-400">Supply <span className="text-white font-medium">{status.supply_ratio?.toFixed(2)}x</span></span>
            <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse" title="Live" />
          </>
        ) : (
          <span className="text-red-400 text-xs">Node unreachable</span>
        )}
      </div>
    </header>
  );
}

// ─── Activity Feed ─────────────────────────────────────────────────────────
function ActivityFeed({ events, loading }) {
  return (
    <div className="card flex flex-col h-full">
      <div className="px-4 py-3 border-b border-slate-700/50 flex items-center justify-between">
        <span className="font-medium text-sm">Live Activity</span>
        <span className="text-xs text-slate-500">last 50 events · auto-refresh 5s</span>
      </div>
      <div className="overflow-y-auto flex-1" style={{ maxHeight: '420px' }}>
        {loading && !events.length ? (
          <div className="p-4 space-y-3">
            {[...Array(6)].map((_, i) => (
              <div key={i} className="flex gap-3 items-start">
                <Skeleton w="w-20" h="h-5" />
                <div className="flex-1 space-y-1">
                  <Skeleton w="w-48" h="h-3" />
                  <Skeleton w="w-32" h="h-3" />
                </div>
              </div>
            ))}
          </div>
        ) : events.length === 0 ? (
          <div className="p-8 text-center text-slate-500 text-sm">No events yet. Submit a generation or transfer.</div>
        ) : (
          <div className="divide-y divide-slate-700/30">
            {events.map((ev, i) => (
              <div key={ev.id} className={`px-4 py-2.5 flex items-start gap-3 ${i === 0 ? 'fade-in' : ''}`}>
                <EventBadge type={ev.type} />
                <div className="flex-1 min-w-0">
                  <div className="text-xs font-mono text-slate-300 truncate">{truncate(ev.id, 16)}</div>
                  <div className="text-xs text-slate-500 mt-0.5">
                    agent {truncate(ev.agent_id)} · ts {ev.causal_timestamp} · stake {fmtAET(ev.stake_amount)}
                  </div>
                </div>
                <span className={`text-xs px-1.5 py-0.5 rounded ${
                  ev.settlement_state === 'Settled' ? 'bg-green-900/50 text-green-400' :
                  ev.settlement_state === 'Adjusted' ? 'bg-red-900/50 text-red-400' :
                  'bg-yellow-900/50 text-yellow-400'
                }`}>{ev.settlement_state}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Volume Chart ──────────────────────────────────────────────────────────
function VolumeChart({ activity, loading }) {
  if (loading) return (
    <div className="card p-4">
      <div className="font-medium text-sm mb-3">24h Transaction Volume</div>
      <Skeleton w="w-full" h="h-32" />
    </div>
  );

  const data = activity
    ? [...activity.buckets].reverse().map((b, i) => ({
        h: i === activity.buckets.length - 1 ? 'Now' : `-${activity.buckets.length - 1 - i}h`,
        volume: b.volume,
        count: b.count,
      }))
    : [];

  return (
    <div className="card p-4">
      <div className="flex items-center justify-between mb-3">
        <span className="font-medium text-sm">24h Transaction Volume</span>
        <span className="text-xs text-slate-500">stake-weighted (micro-AET)</span>
      </div>
      {data.length === 0 || data.every(d => d.volume === 0) ? (
        <div className="h-32 flex items-center justify-center text-slate-500 text-sm">No activity in the last 24h</div>
      ) : !window.Recharts ? (
        <div className="h-32 flex items-center justify-center text-slate-500 text-sm">Chart unavailable</div>
      ) : (
        <ResponsiveContainer width="100%" height={130}>
          <AreaChart data={data} margin={{ top: 4, right: 0, bottom: 0, left: 0 }}>
            <defs>
              <linearGradient id="volGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%"  stopColor="#00D4AA" stopOpacity={0.3} />
                <stop offset="95%" stopColor="#00D4AA" stopOpacity={0.02} />
              </linearGradient>
            </defs>
            <XAxis dataKey="h" tick={{ fill: '#64748b', fontSize: 11 }} tickLine={false} axisLine={false} />
            <YAxis hide />
            <Tooltip
              contentStyle={{ background: '#1E2D40', border: '1px solid #2d4a6b', borderRadius: 8, fontSize: 12 }}
              labelStyle={{ color: '#94a3b8' }}
              formatter={(v, n) => [n === 'volume' ? fmtAET(v) : v, n === 'volume' ? 'Volume' : 'Events']}
            />
            <Area type="monotone" dataKey="volume" stroke="#00D4AA" strokeWidth={2} fill="url(#volGrad)" />
          </AreaChart>
        </ResponsiveContainer>
      )}
    </div>
  );
}

// ─── DAG Stats Quick View ──────────────────────────────────────────────────
function DagStatsPanel({ stats, fees, loading }) {
  if (loading && !stats) return (
    <div className="card p-4 space-y-3">
      <Skeleton w="w-32" h="h-4" />
      <Skeleton w="w-full" h="h-3" />
      <Skeleton w="w-full" h="h-3" />
    </div>
  );

  const typeColors = {
    Transfer: '#60a5fa', Generation: '#34d399', Verification: '#fb923c',
    Attestation: '#c084fc', Delegation: '#fbbf24',
  };

  const total = stats?.total_events || 0;
  const byType = stats?.events_by_type || {};

  return (
    <div className="card p-4">
      <div className="font-medium text-sm mb-3">DAG Breakdown</div>
      <div className="space-y-2">
        {Object.entries(byType).map(([t, n]) => (
          <div key={t} className="flex items-center gap-2">
            <div className="w-2 h-2 rounded-full flex-shrink-0" style={{ background: typeColors[t] || '#94a3b8' }} />
            <span className="text-xs text-slate-400 w-24 flex-shrink-0">{t}</span>
            <div className="flex-1 bg-slate-700/40 rounded-full h-1.5 overflow-hidden">
              <div className="h-full rounded-full transition-all" style={{
                width: total > 0 ? `${(n / total) * 100}%` : '0%',
                background: typeColors[t] || '#94a3b8',
              }} />
            </div>
            <span className="text-xs text-slate-300 w-8 text-right">{n}</span>
          </div>
        ))}
        {Object.keys(byType).length === 0 && (
          <div className="text-xs text-slate-500">No events in DAG yet</div>
        )}
      </div>
      <div className="mt-3 pt-3 border-t border-slate-700/40 flex justify-between text-xs text-slate-500">
        <span>Tips: <span className="text-slate-300">{stats?.tips_count ?? '—'}</span></span>
        <span>Max depth: <span className="text-slate-300">{stats?.max_depth ?? '—'}</span></span>
      </div>
      {fees && (
        <div className="mt-2 flex justify-between text-xs text-slate-500">
          <span>Fees today: <span className="text-slate-300">{fmtAET(fees.total_collected)}</span></span>
          <span>Treasury: <span className="text-slate-300">{fmtAET(fees.treasury_accrued)}</span></span>
        </div>
      )}
    </div>
  );
}

// ─── Leaderboard ──────────────────────────────────────────────────────────
function Leaderboard({ agents, sortField, onSort, loading }) {
  const cols = [
    { key: 'rank',             label: '#',           sort: null },
    { key: 'agent_id',         label: 'Agent',       sort: null },
    { key: 'reputation_score', label: 'Reputation',  sort: 'reputation' },
    { key: 'tasks_completed',  label: 'Tasks',       sort: 'tasks' },
    { key: 'balance',          label: 'Balance',     sort: 'balance' },
    { key: 'trust_limit',      label: 'Trust Limit', sort: null },
    { key: 'staked_amount',    label: 'Staked',      sort: null },
  ];

  return (
    <div className="card overflow-hidden">
      <div className="px-4 py-3 border-b border-slate-700/50 flex items-center justify-between">
        <span className="font-medium text-sm">Agent Leaderboard</span>
        <div className="flex gap-2 text-xs">
          {['reputation', 'balance', 'tasks'].map(s => (
            <button key={s}
              onClick={() => onSort(s)}
              className={`px-2 py-1 rounded transition-colors ${
                sortField === s ? 'accent-bg text-black font-semibold' : 'text-slate-400 hover:text-white'
              }`}
            >{s.charAt(0).toUpperCase() + s.slice(1)}</button>
          ))}
        </div>
      </div>
      <div className="overflow-x-auto">
        <table>
          <thead>
            <tr>{cols.map(c => <th key={c.key}>{c.label}</th>)}</tr>
          </thead>
          <tbody>
            {loading && !agents.length
              ? [...Array(5)].map((_, i) => (
                  <tr key={i}>
                    {cols.map(c => <td key={c.key}><Skeleton w="w-20" h="h-3" /></td>)}
                  </tr>
                ))
              : agents.length === 0
              ? <tr><td colSpan={cols.length} className="text-center text-slate-500 py-8">No agents registered yet</td></tr>
              : agents.map(a => (
                  <tr key={a.agent_id} className="fade-in">
                    <td className="text-slate-500 font-mono">{a.rank}</td>
                    <td className="font-mono text-slate-300">{truncate(a.agent_id, 14)}</td>
                    <td className="accent">{fmtNum(a.reputation_score)}</td>
                    <td>{fmtNum(a.tasks_completed)}</td>
                    <td>{fmtAET(a.balance)}</td>
                    <td>{fmtAET(a.trust_limit)}</td>
                    <td>{fmtAET(a.staked_amount)}</td>
                  </tr>
                ))
            }
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Economics Bar ─────────────────────────────────────────────────────────
function EconomicsBar({ econ, loading }) {
  if (loading && !econ) return (
    <div className="card p-3 flex gap-8">
      {[...Array(4)].map((_, i) => <Skeleton key={i} w="w-32" h="h-8" />)}
    </div>
  );
  if (!econ) return null;

  const items = [
    { label: 'Total Supply',    value: fmtAET(econ.total_supply) },
    { label: 'Circulating',     value: fmtAET(econ.circulating_supply) },
    { label: 'Onboarding Pool', value: fmtAET(econ.onboarding_pool_total) },
    { label: 'Allocated',       value: fmtAET(econ.onboarding_allocated) },
    { label: 'Treasury',        value: fmtAET(econ.treasury_accrued) },
    { label: 'Fee (bps)',       value: econ.fee_basis_points },
  ];

  return (
    <div className="card px-4 py-3 flex flex-wrap gap-6">
      {items.map(it => (
        <div key={it.label}>
          <div className={`text-sm font-medium ${it.highlight || 'text-white'}`}>{it.value}</div>
          <div className="text-xs text-slate-500">{it.label}</div>
        </div>
      ))}
    </div>
  );
}

// ─── App Root ──────────────────────────────────────────────────────────────
function App() {
  const [status,   setStatus]   = useState(null);
  const [events,   setEvents]   = useState([]);
  const [activity, setActivity] = useState(null);
  const [stats,    setStats]    = useState(null);
  const [agents,   setAgents]   = useState([]);
  const [econ,     setEcon]     = useState(null);
  const [sortField, setSortField] = useState('reputation');
  const [loading,  setLoading]  = useState(true);
  const [error,    setError]    = useState(null);

  const refresh = useCallback(async () => {
    try {
      const [s, ev, act, st, lb, ec] = await Promise.all([
        apiFetch('/v1/status'),
        apiFetch('/v1/events/recent?limit=50'),
        apiFetch(`/v1/network/activity?hours=24`),
        apiFetch('/v1/dag/stats'),
        apiFetch(`/v1/agents/leaderboard?sort=${sortField}&limit=20`),
        apiFetch('/v1/economics'),
      ]);
      setStatus(s);
      setEvents(ev);
      setActivity(act);
      setStats(st);
      setAgents(lb);
      setEcon(ec);
      setError(null);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [sortField]);

  // Initial load + interval
  useEffect(() => { refresh(); }, [refresh]);
  useEffect(() => {
    const id = setInterval(refresh, 5000);
    return () => clearInterval(id);
  }, [refresh]);

  return (
    <div className="min-h-screen flex flex-col">
      <Header status={status} loading={loading && !status} />

      {error && !status && (
        <div className="mx-6 mt-4 p-3 bg-red-900/30 border border-red-700/50 rounded-lg text-red-300 text-sm">
          Cannot reach node at <code>{API}</code>: {error}
        </div>
      )}

      <main className="flex-1 px-6 py-5 space-y-5">
        {/* Top stat cards */}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <StatCard label="DAG Events"    value={stats ? fmtNum(stats.total_events) : null} />
          <StatCard label="Active Agents" value={stats ? fmtNum(agents.length) : null} />
          <StatCard label="OCS Pending"   value={status ? status.ocs_pending : null} />
          <StatCard label="Supply Ratio"  value={status ? `${status.supply_ratio?.toFixed(2)}×` : null} />
        </div>

        {/* Main panels: activity feed + charts */}
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
          <div className="lg:col-span-3">
            <ActivityFeed events={events} loading={loading} />
          </div>
          <div className="lg:col-span-2 flex flex-col gap-4">
            <VolumeChart activity={activity} loading={loading && !activity} />
            <DagStatsPanel stats={stats} fees={econ} loading={loading && !stats} />
          </div>
        </div>

        {/* Leaderboard */}
        <Leaderboard agents={agents} sortField={sortField} onSort={setSortField} loading={loading} />

        {/* Economics bar */}
        <EconomicsBar econ={econ} loading={loading && !econ} />
      </main>

      <footer className="px-6 py-3 border-t border-slate-700/30 text-xs text-slate-600 flex justify-between">
        <span>AetherNet v0.1.0-testnet</span>
        <span>Auto-refresh every 5s · {new Date().toLocaleTimeString()}</span>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
